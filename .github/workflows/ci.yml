name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx wxt prepare
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run zip
      - uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: .output/**/*.zip
